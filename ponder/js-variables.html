<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Variables</title>
    <script>
        // Javascript land

        // let the keyword for a variable
        /*
        multiline comment
        works for blocks of comments
        */
        let name = "Aubrey Jensen";
        let age = 21;

        age = age + 1;
        age += 1;

        // This works like print in python
        // In the workforce you ALWAYS remove console logs before you push it
        // They are good for debugging code, but they are a security risk in the real world
        console.log(age);

        // constant means the variable cannot change after the fact
        const NAME_OF_THE_CHURCH = "The Church of Jesus Christ of Latter-day Saints";

        // NAME_OF_THE_CHURCH = "God's Church"

        // ""==="" means IS REALLY EQUAL TO (checks not just value but type)
        if (name === "Aubrey Jensen") {
            // Javascript follows scope
            let greeting = "welcome";
        }

        // console.lot(greeting);

    </script>
</head>
<body>
    <header></header>
    <main></main>
    <footer></footer>
</body>
</html>
